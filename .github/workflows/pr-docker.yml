name: PR Docker Build

on:
  pull_request:
    types: [labeled]

jobs:
  build:
    if: github.event.label.name == 'docker'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sanitise branch name for Docker tag
        id: branch
        run: |
          # Replace non-alphanumeric chars with hyphens and lowercase
          TAG=$(echo "${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-//;s/-$//')
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build and push PR image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post pull instructions
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.branch.outputs.tag }}';
            const image = `ghcr.io/${{ env.IMAGE_NAME }}:${tag}`;
            const body = `### 🐳 PR Docker image ready\n\`\`\`\ndocker pull ${image}\ndocker run -d -p 5000:5000 \\\n  -e SECRET_KEY=changeme \\\n  -e PLEX_URL=http://your-plex:32400 \\\n  -e PLEX_TOKEN=your-token \\\n  -e SECTION_MAPPING='{"/": "1"}' \\\n  ${image}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
