name: Docker Build & Publish

# This workflow runs when a push is made to the default branch (usually main/master)
# OR when a Pull Request is opened/updated against the default branch.
on:
  push:
    branches: [ "main", "master", "dev" ]
    # Only run if these specific files change
    paths:
      - 'media-servarr-sync.py'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'requirements.txt'
      - 'templates/**'
      - 'static/**'

  workflow_dispatch:

  pull_request:
    branches: [ "main", "master", "dev" ]
    # Only run if these specific files change
    paths:
      - 'media-servarr-sync.py'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'requirements.txt'
      - 'templates/**'
      - 'static/**'

env:
  # Use docker.io for Docker Hub if you prefer
  REGISTRY: ghcr.io
  # We will set the lowercase IMAGE_NAME dynamically in the steps below

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CHANGED: Required to create tags and releases
      packages: write
      id-token: write
      security-events: write # Required to upload Trivy SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      # Promote [Unreleased] → [vX.Y.Z] and commit back to the branch
      - name: Promote Unreleased to versioned release
        id: promote
        if: github.event_name == 'push'
        run: |
          python3 - <<'PYEOF'
          import re, datetime, os, sys

          with open("CHANGELOG.md") as f:
              lines = f.readlines()

          # Find [Unreleased] heading
          unrel_idx = next(
              (i for i, l in enumerate(lines) if re.match(r'^## \[Unreleased\]', l)),
              None,
          )
          if unrel_idx is None:
              print("No [Unreleased] section — nothing to promote.")
              sys.exit(0)

          # Find the --- separator that closes this block
          sep_idx = next(
              i for i, l in enumerate(lines) if i > unrel_idx and l.strip() == "---"
          )

          block = "".join(lines[unrel_idx + 1:sep_idx])
          if not block.strip():
              print("Empty [Unreleased] block — nothing to promote.")
              sys.exit(0)

          # Bump type: minor if ### Added present, patch otherwise
          has_added = bool(re.search(r'^### Added', block, re.MULTILINE))
          has_breaking = bool(re.search(r'^### Breaking', block, re.MULTILINE))

          # Find last released version
          versions = re.findall(r'^## \[v(\d+)\.(\d+)\.(\d+)\]', "".join(lines), re.MULTILINE)
          if versions:
              major, minor, patch = map(int, versions[0])
          else:
              major, minor, patch = 0, 11, 0  # bootstrap from last known

          if has_breaking:
              major += 1; minor = 0; patch = 0
          elif has_added:
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"v{major}.{minor}.{patch}"
          today = datetime.date.today().strftime("%Y-%m-%d")
          lines[unrel_idx] = f"## [{new_version}] - {today}\n"

          with open("CHANGELOG.md", "w") as f:
              f.writelines(lines)

          print(f"Promoted [Unreleased] → [{new_version}]")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"VERSION={new_version}\n")
          PYEOF

      - name: Commit promoted CHANGELOG
        if: github.event_name == 'push' && steps.promote.outputs.VERSION != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: release ${{ steps.promote.outputs.VERSION }} [skip ci]" && \
            git push

      - name: Get Changelog Entry
        id: changelog_reader
        if: github.event_name == 'push' && steps.promote.outputs.VERSION != ''
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.promote.outputs.VERSION }}
          path: ./CHANGELOG.md

      - name: Create release
        id: create_release
        if: github.event_name == 'push' && steps.promote.outputs.VERSION != ''
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          token: ${{ github.token }}
          tag_name: ${{ steps.promote.outputs.VERSION }}

      # FIX: Force the image name to lowercase to avoid Docker registry errors
      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.1.1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.promote.outputs.VERSION }},enable=${{ github.event_name == 'push' && steps.promote.outputs.VERSION != '' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      # Build and Load into local Docker daemon for testing
      - name: Build Docker image (Load Local)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Run Container for Testing
        run: |
          # Get the first tag generated by the metadata step
          TAGS="${{ steps.meta.outputs.tags }}"
          TEST_TAG=$(echo "$TAGS" | head -n 1)

          echo "Starting container with tag: $TEST_TAG"
          # Run disconnected (-d) mapped to port 5000 with minimal env vars for startup
          docker run -d -p 5000:5000 \
            -e SECRET_KEY=ci-test-secret-key \
            -e PLEX_URL=http://localhost:32400 \
            -e PLEX_TOKEN=ci-test-token \
            -e SECTION_MAPPING='{"/" : "1"}' \
            -e DEMO_MODE=true \
            -e ONBOARD_WIKI_URL=https://example.com/wiki \
            -e ONBOARD_REQUEST_URL=https://example.com/requests \
            --name test-container "$TEST_TAG"

      - name: Wait for container to start (with retry)
        run: |
          echo "Waiting for service to be ready..."
          # Retry loop: Try curl 10 times with 2s delay
          for i in {1..10}; do
            if curl -s -o /dev/null http://localhost:5000; then
              echo "Service is up!"
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "Service failed to start in time."
          docker logs test-container
          exit 1

      - name: Test Homepage Availability
        run: |
          # Check URL. -L follows redirects (root -> /login).
          echo "Testing homepage access..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" -L http://localhost:5000)
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq "200" ]; then
            echo "✅ Test Passed: Website is up and accessible."
          else
            echo "❌ Test Failed: Website returned status $HTTP_STATUS"
            echo "--- Container Logs ---"
            docker logs test-container
            exit 1
          fi

      - name: Install Playwright
        if: false
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Take demo screenshots
        if: false
        run: |
          python3 - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          BASE = "http://localhost:5000"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  ctx = await browser.new_context(viewport={"width": 1280, "height": 900})
                  page = await ctx.new_page()

                  await page.goto(f"{BASE}/login")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-login.png", full_page=True)
                  print("Saved screenshot-login.png")

                  await page.goto(f"{BASE}/login/demo")
                  await page.wait_for_load_state("networkidle")

                  await page.goto(f"{BASE}/")
                  await page.wait_for_load_state("networkidle")
                  await page.wait_for_timeout(1500)
                  await page.screenshot(path="screenshot-webui.png", full_page=True)
                  print("Saved screenshot-webui.png")

                  await page.goto(f"{BASE}/invites")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-invites.png", full_page=True)
                  print("Saved screenshot-invites.png")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit screenshots to repo
        if: false
        run: |
          mkdir -p screenshots
          cp screenshot-login.png   screenshots/login.png
          cp screenshot-webui.png   screenshots/webui.png
          cp screenshot-invites.png screenshots/invites.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git diff --staged --quiet && echo "No changes to screenshots." || \
            git commit -m "chore: update demo screenshots [skip ci]" && \
            git push origin HEAD:${{ github.head_ref || github.ref_name }}

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v7
        if: false
        with:
          name: demo-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 30

      - name: Stop Test Container
        if: always()
        run: docker rm -f test-container

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
