name: Lint

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - '**.py'
      - 'ruff.toml'
  pull_request:
    branches: [ "main", "master", "dev" ]
    paths:
      - '**.py'
      - 'ruff.toml'

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run ruff
        uses: astral-sh/ruff-action@v3
